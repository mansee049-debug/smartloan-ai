{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 65vh;">
    <div class="col-md-5">
        <div class="glass-card">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-white mb-1">Welcome Back</h3>
                <p class="text-secondary small">Access your secure risk assessment dashboard</p>
            </div>
            
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-secondary small">Corporate Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary border-opacity-20 text-secondary">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" class="form-control" name="email" placeholder="name@company.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-secondary small">Secure Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary border-opacity-20 text-secondary">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="loginPassword" class="form-control" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-check mt-2">
                        <input class="form-check-input" type="checkbox" id="showPasswordCheck" onclick="togglePasswordVisibility()">
                        <label class="form-check-label text-muted small" for="showPasswordCheck">
                            Show Password
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-premium w-100 py-2.5 mb-3">
                    Authenticate Securely <i class="fa-solid fa-shield-check ms-1"></i>
                </button>
            </form>

            <div class="text-center mt-4 border-top border-secondary border-opacity-10 pt-3">
                <p class="text-secondary small mb-0">New to the platform? <a href="{{ url_for('register') }}" class="text-info text-decoration-none fw-medium">Create an Account</a></p>
            </div>
        </div>
    </div>
</div>

<script>
function togglePasswordVisibility() {
    const passwordInput = document.getElementById('loginPassword');
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
    } else {
        passwordInput.type = 'password';
    }
}
</script>
{% endblock %}
